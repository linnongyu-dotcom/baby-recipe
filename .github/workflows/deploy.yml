name: Deploy to CloudBase

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check Secrets
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
        run: |
          if [ -z "$TCB_SECRET_ID" ]; then echo "TCB_SECRET_ID 为空"; else echo "TCB_SECRET_ID 已设置 (长度: ${#TCB_SECRET_ID})"; fi
          if [ -z "$TCB_SECRET_KEY" ]; then echo "TCB_SECRET_KEY 为空"; else echo "TCB_SECRET_KEY 已设置 (长度: ${#TCB_SECRET_KEY})"; fi

      - name: Deploy to CloudBase
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
        run: node scripts/deploy-cloudbase.cjs
